global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: ghostlink-backends
    metrics_path: /metrics
    static_configs:
      - targets:
          - app1:5000
          - app2:5000

  - job_name: ghostlink-security
    metrics_path: /metrics
    static_configs:
      - targets:
          - security-exporter:9101

  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets:
          - prometheus:9090
